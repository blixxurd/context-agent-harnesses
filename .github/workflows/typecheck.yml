name: typecheck

on:
  push:
    branches: [main]
    paths:
      - "code_samples/typescript/**"
      - ".github/workflows/typecheck.yml"
  pull_request:
    paths:
      - "code_samples/typescript/**"
      - ".github/workflows/typecheck.yml"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code_samples/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: code_samples/typescript/package-lock.json
      - run: npm ci
      - run: npm run typecheck
